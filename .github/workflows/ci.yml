name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libgl1 libxcb-cursor0 \
            libxkbcommon-x11-0 libdbus-1-3 xvfb

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install qt5 -y

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install qt

      - name: Install build tools
        run: python -m pip install --upgrade pip build toml

      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          python -c "import toml; print('version=' + toml.load('pyproject.toml')['project']['version'])" >> $GITHUB_OUTPUT

      - name: Build package
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.version }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          